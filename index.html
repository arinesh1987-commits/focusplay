<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusPlay</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
}

.app {
  display:flex;
  flex-direction:column;
  height:100vh;
}

.content {
  flex:1;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.header {
  display:flex;
  justify-content:space-between;
}

.timer {
  font-size:50px;
  text-align:center;
  margin:25px 0;
}

.row {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.mode { background:#334155; color:white; }
.start { background:#22c55e; }
.pause { background:#f59e0b; }
.reset { background:#ef4444; }

.nav {
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#020617;
}

.nav button {
  background:none;
  color:#94a3b8;
  font-size:20px;
}

.nav button.active {
  color:#38bdf8;
}

.screen { display:none; }
.screen.active { display:block; }

.stat {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="app">

<div class="content">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">

    <div class="header">
      <div>🔥 <span id="streak">0</span></div>
      <div>🪙 <span id="coins">0</span></div>
    </div>

    <div id="timer" class="timer">10:00</div>

    <div class="row">
      <button class="mode" onclick="setMode(600)">Normal</button>
      <button class="mode" onclick="setMode(1500)">Pomodoro</button>
    </div>

    <div class="row">
      <button class="start" onclick="startTimer()">Start</button>
      <button class="pause" onclick="pauseTimer()">Pause</button>
      <button class="reset" onclick="resetTimer()">Reset</button>
    </div>

  </div>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <div class="stat">Sessions: <span id="sessions">0</span></div>
  <div class="stat">Time: <span id="time">0</span> min</div>
</div>

</div>

<div class="nav">
  <button onclick="switchTab('home', this)" class="active">🏠</button>
  <button onclick="switchTab('stats', this)">📊</button>
</div>

</div>

<script>

let coins = localStorage.getItem("coins") || 0;
let streak = localStorage.getItem("streak") || 0;
let sessions = localStorage.getItem("sessions") || 0;
let timeSpent = localStorage.getItem("time") || 0;

let timeLeft = 600;
let interval = null;

function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("streak").innerText = streak;
  document.getElementById("sessions").innerText = sessions;
  document.getElementById("time").innerText = timeSpent;
}

function setMode(sec){
  timeLeft = sec;
  updateTimer();
}

function updateTimer(){
  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;
  document.getElementById("timer").innerText =
    (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function startTimer(){
  if(interval) return;

  interval = setInterval(()=>{
    timeLeft--;
    updateTimer();

    if(timeLeft <= 0){
      clearInterval(interval);
      interval = null;

      coins = Number(coins) + 10;
      streak = Number(streak) + 1;
      sessions = Number(sessions) + 1;
      timeSpent = Number(timeSpent) + 10;

      save();
      alert("Session Completed!");
    }
  },1000);
}

function pauseTimer(){
  clearInterval(interval);
  interval = null;
}

function resetTimer(){
  clearInterval(interval);
  interval = null;
  timeLeft = 600;
  updateTimer();
}

function switchTab(id, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("streak", streak);
  localStorage.setItem("sessions", sessions);
  localStorage.setItem("time", timeSpent);
  updateUI();
}

window.onload = ()=>{
  updateUI();
  updateTimer();
};

</script>

</body>
</html>
